<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FAFAF7; }
    .slide {
      width: 1080px;
      height: 1350px;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
      overflow: hidden;
      background: #FAFAF7;
      color: #111111;
    }

    /* Faixa de cor no topo */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: #FF4545;
    }

    /* Aspas decorativas gigantes */
    .bg-quote {
      position: absolute;
      top: 60px;
      left: 50px;
      font-size: 520px;
      font-weight: 900;
      line-height: 1;
      color: rgba(255,69,69,0.07);
      user-select: none;
      pointer-events: none;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* Header */
    .header {
      position: absolute;
      top: 48px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(17,17,17,0.35);
    }
    .counter {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: rgba(17,17,17,0.30);
    }

    /* Conteúdo */
    .content {
      position: absolute;
      bottom: 110px;
      left: 80px;
      right: 80px;
      z-index: 2;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: #FF4545;
      margin-bottom: 40px;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: #FF4545;
      border-radius: 2px;
    }

    .quote-text {
      font-size: 72px;
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.04em;
      color: #111111;
      margin-bottom: 48px;
      position: relative;
    }
    .quote-text span {
      color: #FF4545;
    }

    .attribution {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .attribution-line {
      width: 32px;
      height: 2px;
      background: rgba(17,17,17,0.25);
    }
    .attribution-text {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(17,17,17,0.45);
    }

    .rule {
      width: 64px;
      height: 4px;
      background: #FF4545;
      margin-bottom: 32px;
      border-radius: 2px;
    }

    .body {
      font-size: 21px;
      font-weight: 400;
      line-height: 1.6;
      color: rgba(17,17,17,0.60);
      max-width: 700px;
    }
    .body strong {
      font-weight: 700;
      color: #111111;
    }

    /* Stamp circular */
    .stamp {
      position: absolute;
      top: 180px;
      right: 80px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid rgba(255,69,69,0.20);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: rotate(-12deg);
      z-index: 2;
    }
    .stamp-text {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,69,69,0.50);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar"></div>
    <div class="bg-quote">"</div>

    <div class="header">
      <div class="logo">MazyUI</div>
      <div class="counter">03 / 06</div>
    </div>

    <div class="stamp">
      <div class="stamp-text">Princípio<br>Universal<br>de<br>Design</div>
    </div>

    <div class="content">
      <div class="eyebrow">Regra 02 — Contraste</div>

      <div class="quote-text">
        "Se tudo grita,<br>nada é <span>ouvido.</span>"
      </div>

      <div class="attribution">
        <div class="attribution-line"></div>
        <div class="attribution-text">Princípio universal de design</div>
      </div>

      <div class="rule"></div>

      <p class="body">
        Contraste não é só cor. É tamanho, peso e espaço.
        <strong>Um elemento pesado numa página limpa</strong> vale mais que dez elementos iguais.
      </p>
    </div>
  </div>
</body>
</html>
